name: CI
on:
  pull_request:
  # Trigger on merges to `main` to allow `gradle/gradle-build-action` runs to write their caches.
  # https://github.com/gradle/gradle-build-action#using-the-caches-read-only
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v6
      - uses: browser-actions/setup-chrome@v2
        id: setup-chrome
        with:
          # Use the Chromium snapshot installer (v1's default behavior) instead
          # of v2's `stable` default. The `stable` channel installs Chrome for
          # Testing on macOS but strips the `.app` bundle wrapper from the
          # cached install, which breaks headless launches under Karma even
          # though `--version` succeeds. The `latest` snapshot installer
          # preserves `Chromium.app/Contents/MacOS/Chromium`.
          chrome-version: latest

      - run: ./gradlew assemble
      - run: ./gradlew check
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: test-failure
          path: '**/build/reports/tests/'
          retention-days: 5

      - run: >
          ./gradlew
          -PVERSION_NAME=unspecified
          -PRELEASE_SIGNING_ENABLED=false
          publishToMavenLocal

      - run: ./gradlew jacocoTestReport

      - uses: EnricoMi/publish-unit-test-result-action/macos@v2
        with:
          check_run: false
          junit_files: '**/build/test-results/**/*.xml'
          report_individual_runs: true

      - uses: codecov/codecov-action@v6
